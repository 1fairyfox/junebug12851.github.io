# Dependabot — keep dependencies and GitHub Actions current.
# Copy to `.github/dependabot.yml`. See hub/standards/dependencies.md (upgrade policy)
# and supply-chain-hardening.md (the github-actions ecosystem keeps SHA-pinned Actions
# current). Targets the WORKING branch (dev) so update PRs match the mesh's git-flow
# instead of piling onto the default branch.

version: 2
updates:
  # App/library dependencies. Set `package-ecosystem` to YOUR stack (this default is npm;
  # a JVM/Rust/Python project edits it — see the commented variants below). Monorepos list
  # one block per package dir.
  - package-ecosystem: "npm"        # ← gradle | maven | cargo | pip | gomod | … per stack
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies"]
  # Non-npm variants (uncomment the one that matches; delete the npm block above):
  #   - package-ecosystem: "gradle"   # Kotlin/Java Gradle
  #   - package-ecosystem: "maven"    # Java Maven
  #   - package-ecosystem: "cargo"    # Rust
  #   - package-ecosystem: "pip"      # Python
  # (same directory/schedule/target-branch/groups/labels block as above)

  # GitHub Actions — required so SHA-pinned Actions stay current (Scorecard
  # Pinned-Dependencies stays green without going stale).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    labels: ["dependencies", "github-actions"]
