<header class="site-header">
  <div class="wrap">
    <a class="brand" href="{{ '/' | relative_url }}">
      <img class="brand-logo" src="{{ '/assets/icons/fox.png' | relative_url }}" alt="" aria-hidden="true">
      <span class="brand-name">Fairy&nbsp;Fox</span>
    </a>

    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    {%- assign p = page.url -%}
    <nav class="nav" aria-label="Primary">
      <a href="{{ '/' | relative_url }}" class="{% if p == '/' %}active{% endif %}">Home</a>
      <a href="{{ '/projects/' | relative_url }}" class="{% if p contains '/projects' %}active{% endif %}">Projects</a>
      <a href="{{ '/games/' | relative_url }}" class="{% if p contains '/games' %}active{% endif %}">Games</a>
      <a href="{{ '/docs/' | relative_url }}" class="{% if p contains '/docs' %}active{% endif %}">Docs</a>
      <a href="{{ '/downloads/' | relative_url }}" class="{% if p contains '/downloads' %}active{% endif %}">Downloads</a>
      <a href="{{ '/blog/' | relative_url }}" class="{% if p contains '/blog' %}active{% endif %}">Updates</a>
      <a href="{{ '/about/' | relative_url }}" class="{% if p contains '/about' %}active{% endif %}">About</a>
    </nav>
  </div>
</header>
