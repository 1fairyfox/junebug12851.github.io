# Dependabot — keep dependencies and GitHub Actions current.
# See hub/standards/dependencies.md (upgrade policy) and supply-chain-hardening.md (the
# github-actions ecosystem keeps SHA-pinned Actions current). Targets the WORKING branch
# (dev) so update PRs match the mesh's git-flow instead of piling onto main.

version: 2
updates:
  # Ruby gems — the Jekyll toolchain (Gemfile / Gemfile.lock).
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies"]

  # GitHub Actions — required so the SHA-pinned Actions in .github/workflows stay current
  # (Scorecard Pinned-Dependencies stays green without going stale).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    labels: ["dependencies", "github-actions"]
