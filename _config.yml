# ── fairyfox.io ─────────────────────────────────────────────────────────────
# Jekyll configuration. fairyfox.io is the project hub and documentation library
# for Fairy Fox's software work. Built and deployed by GitHub Actions
# (.github/workflows/pages.yml). The version number is NOT here — the single
# source of truth is the repo-root `VERSION` file (see notes/reference/versioning.md).

title: Fairy Fox
tagline: Projects, documentation, and updates.
description: >-
  The project hub and documentation library for Fairy Fox's software work — an
  index of projects, the documentation behind them, and a log of what's changing.

# Public site identity. baseurl is empty because this is served at the domain
# root: the fairyfox.io custom domain on this repo's GitHub Pages.
url: "https://fairyfox.io"
baseurl: ""

author:
  name: Fairy Fox
  github: 1fairyfox

# ── Collections ──────────────────────────────────────────────────────────────
# The on-site documentation library.
collections:
  docs:
    output: true
    permalink: /docs/:path/

# ── Build behaviour ─────────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: docs
    values:
      layout: doc
  - scope:
      path: ""
    values:
      layout: page

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

feed:
  path: /feed.xml

# ── What Jekyll must NOT try to render ───────────────────────────────────────
exclude:
  - assets/references/
  - notes/
  - hub/
  - vendor/
  - Gemfile
  - Gemfile.lock
  - README.md
  - CLAUDE.md
  - VERSION
  - "*.ps1"
  - .github/
