# ── fairyfox.io ─────────────────────────────────────────────────────────────
# Jekyll configuration. This is the personal home page + hub for Twilight
# (github.com/junebug12851). Built and deployed by GitHub Actions (see
# .github/workflows/pages.yml). The version number is NOT here — the single
# source of truth is the repo-root `VERSION` file (see notes/reference/versioning.md).

title: Fairy Fox
tagline: Home base for Twilight — projects, writing, and what I'm up to.
description: >-
  The personal home page and project hub of Twilight (junebug12851):
  a place for my projects, a blog about what I'm building, and the
  shared standards that tie my repositories together.

# Public site identity. baseurl is empty because this is served at the domain
# root (custom domain fairyfox.io via CNAME, and as the user site
# junebug12851.github.io).
url: "https://fairyfox.io"
baseurl: ""

author:
  name: Twilight
  github: junebug12851

# ── Build behaviour ─────────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Posts get the "post" layout automatically; top-level pages get "page".
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
    values:
      layout: page

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

feed:
  path: /feed.xml

# ── What Jekyll must NOT try to render ───────────────────────────────────────
# assets/references holds shallow clones of OTHER repositories (read-only, for
# cross-project reference and blogging — see notes/reference/cross-project-sync.md).
# notes/ and hub/ are the human/AI knowledge base + cross-project templates;
# they live in the repo but are not part of the rendered website.
exclude:
  - assets/references/
  - notes/
  - hub/
  - vendor/
  - Gemfile
  - Gemfile.lock
  - README.md
  - CLAUDE.md
  - VERSION
  - "*.ps1"
  - .github/
